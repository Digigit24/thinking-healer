name: Deploy Thinking Healer to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy NewsExo theme
        run: |
          scp -i ~/.ssh/deploy_key -r wp-content/themes/newsexo/* ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/jupiteermri/public_html/thinkinghealer.com/wp-content/themes/newsexo/
