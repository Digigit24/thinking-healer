name: Deploy Thinking Healer to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy NewsExo theme via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 88.222.214.190
          username: jupiteermri
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "wp-content/themes/newsexo/*"
          target: "/home/jupiteermri/public_html/thinkinghealer.com/wp-content/themes/newsexo"
          strip_components: 3
